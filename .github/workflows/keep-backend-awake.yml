name: Keep backend awake

# Render's free tier sleeps after ~15 min with no traffic, which causes the
# slow/failed first load after the site's been quiet. This pings the backend
# on a schedule so it stays warm.
#
# Interval is 5 min because GitHub's scheduled runs can be delayed under load —
# 5 min gives margin against Render's 15-min sleep. (This does NOT protect
# against a full Render platform incident; nothing on our side can. For a more
# punctual free option, point UptimeRobot at the same URL.)
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the backend
        run: |
          code=$(curl -s -o /dev/null -m 40 -w "%{http_code}" \
            https://da-vinci-backend.onrender.com/api/system/status || echo 000)
          echo "backend /api/system/status -> $code"
          # Always succeed — a transient down backend must not spam failure emails.
          exit 0
