name: Build Android APK

# Cut a release by pushing a version tag:  git tag v1.0.0 && git push origin v1.0.0
# The signed .apk is built and attached to the matching GitHub Release.
# You can also run it manually (Actions tab -> Run workflow) to get an APK as a
# downloadable build artifact without cutting a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/release.keystore"

      - name: Compute version name
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            NAME="${GITHUB_REF_NAME#v}"
          else
            NAME="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon -Pvname=${{ steps.ver.outputs.name }} -Pvcode=${{ github.run_number }}

      - name: Stage APK
        run: cp android/app/build/outputs/apk/release/app-release.apk "da-vinci-${{ steps.ver.outputs.name }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: da-vinci-apk
          path: da-vinci-*.apk

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: da-vinci-*.apk
          name: Da Vinci ${{ github.ref_name }}
          body: |
            **Da Vinci for Android** — ${{ github.ref_name }}

            Download `da-vinci-${{ steps.ver.outputs.name }}.apk` below. On your
            phone: open it, allow install from unknown sources when prompted, and
            install. The app opens the live site, so it updates itself — you only
            need a new APK when the app's shell (icon, name) changes.
