name: Build Android APK

# TWO ways to run this:
#  • Dry run (no setup): Actions tab -> Build Android APK -> Run workflow. With no
#    signing secrets configured it builds a DEBUG apk you can install on any phone
#    to test — proves the build works before you touch signing.
#  • Real release: once the 4 signing secrets are set (see android/README.md),
#    push a version tag:  git tag v1.0.0 && git push origin v1.0.0
#    -> a SIGNED apk is built and attached to the matching GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      # Do we have a signing key? Decides signed-release vs installable-debug.
      - name: Detect signing key
        id: mode
        env:
          HAS_KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          if [ "$HAS_KS" = "true" ]; then echo "signed=true" >> "$GITHUB_OUTPUT"; else echo "signed=false" >> "$GITHUB_OUTPUT"; fi

      - name: Compute version name
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then NAME="${GITHUB_REF_NAME#v}"; else NAME="0.0.${GITHUB_RUN_NUMBER}"; fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        if: steps.mode.outputs.signed == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build signed release APK
        if: steps.mode.outputs.signed == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle assembleRelease --no-daemon -Pvname=${{ steps.ver.outputs.name }} -Pvcode=${{ github.run_number }}
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/da-vinci-${{ steps.ver.outputs.name }}.apk"

      - name: Build debug APK (no signing key configured)
        if: steps.mode.outputs.signed == 'false'
        working-directory: android
        run: |
          gradle assembleDebug --no-daemon -Pvname=${{ steps.ver.outputs.name }} -Pvcode=${{ github.run_number }}
          cp app/build/outputs/apk/debug/app-debug.apk "$GITHUB_WORKSPACE/da-vinci-${{ steps.ver.outputs.name }}-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: da-vinci-apk
          path: da-vinci-*.apk

      - name: Attach signed APK to GitHub Release
        if: github.ref_type == 'tag' && steps.mode.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: da-vinci-*.apk
          name: Da Vinci ${{ github.ref_name }}
          body: |
            **Da Vinci for Android** — ${{ github.ref_name }}

            Download `da-vinci-${{ steps.ver.outputs.name }}.apk` below. On your
            phone: open it, allow install from unknown sources when prompted, and
            install. The app opens the live site, so it updates itself — you only
            need a new APK when the app's shell (icon, name) changes.
